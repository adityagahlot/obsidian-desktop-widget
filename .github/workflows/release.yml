name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build:win
      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ObsidianGraphWidget.exe
            dist/ObsidianGraphWidget-Setup-*.exe
          generate_release_notes: true
          draft: false
